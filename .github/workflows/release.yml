name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Create module archive
        run: |
          mkdir -p package/item-piles-symbaroum
          cp module.json LICENSE README.md changelog.md package/item-piles-symbaroum/
          cp -R dist languages templates systems package/item-piles-symbaroum/
          cd package
          zip -r ../item-piles-symbaroum.zip item-piles-symbaroum

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            module.json
            item-piles-symbaroum.zip
