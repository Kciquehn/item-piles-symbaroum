name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Validate release metadata
        run: |
          npm run validate:release
          node -e "const manifest = require('./module.json'); const tag = process.env.GITHUB_REF_NAME.replace(/^v/, ''); if (tag !== manifest.version) throw new Error('Tag and manifest versions differ');"

      - name: Build
        run: npm run build

      - name: Create module archive
        run: |
          set -euo pipefail
          mkdir -p package/item-piles-symbaroum
          cp module.json LICENSE README.md SECURITY.md CONTRIBUTING.md changelog.md package/item-piles-symbaroum/
          cp -R assets dist languages templates systems packs package/item-piles-symbaroum/
          cd package
          zip -r -q ../item-piles-symbaroum.zip item-piles-symbaroum

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          generate_release_notes: true
          files: |
            module.json
            item-piles-symbaroum.zip
